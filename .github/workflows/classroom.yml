name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Git Pipeline Check
      id: git-pipeline-check
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Git Pipeline Check
        setup-command: ''
        command: javac src/Main.java && java -cp src Main
        input: ''
        expected-output: SETUP COMPLETE
        comparison-method: exact
        timeout: 10
        max-score: 100
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        GIT-PIPELINE-CHECK_RESULTS: "${{steps.git-pipeline-check.outputs.result}}"
      with:
        runners: git-pipeline-check
